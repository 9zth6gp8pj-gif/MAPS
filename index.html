<style>
:root{--bg:#1C1B1A;--surface:#241F1B;--raised:#322B25;--chalk:#EDEAE3;--dim:#9C9388;--red:#C2402E;--blue:#3A7CA5;--yellow:#D6A53C;--green:#4C8B5B;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;background:var(--bg)}
body{min-height:100vh;background:var(--bg);color:var(--chalk);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(237,234,227,.04) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
.app-shell{display:flex;flex-direction:column;min-height:100vh;padding-top:var(--safe-top)}
.top-bar{background:var(--surface);border-bottom:1px solid rgba(237,234,227,.08);padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.top-bar h1{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px}
.phase-badge{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;padding:3px 8px;border-radius:4px;border:1px solid}
.scroll-content{flex:1;overflow-y:auto;padding-bottom:calc(72px + var(--safe-bottom));-webkit-overflow-scrolling:touch}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid rgba(237,234,227,.08);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;color:var(--dim);font-family:'Inter',sans-serif;font-size:10px;font-weight:500;letter-spacing:.5px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:var(--yellow)}
.tab-btn svg{width:22px;height:22px}
.card{background:var(--surface);border:1px solid rgba(237,234,227,.07);border-radius:12px;margin:10px 14px;overflow:hidden}
.card-header{padding:14px 16px 10px;border-bottom:1px solid rgba(237,234,227,.06);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)}
.card-body{padding:12px 16px 16px}
.day-hero{padding:16px;display:flex;flex-direction:column;gap:6px}
.day-hero h2{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;letter-spacing:1px}
.day-hero .meta{font-size:12px;color:var(--dim);font-weight:500;letter-spacing:.5px}
.day-controls{display:flex;gap:8px;padding:0 14px 4px;align-items:center}
.day-jump{display:flex;align-items:center;gap:6px;background:var(--raised);border-radius:8px;padding:6px 10px;flex:1}
.day-jump label{font-size:11px;color:var(--dim);white-space:nowrap}
.day-jump input{background:none;border:none;color:var(--chalk);font-family:'JetBrains Mono',monospace;font-size:14px;width:48px;outline:none;text-align:right}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;transition:opacity .15s,transform .1s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:var(--yellow);color:#1C1B1A}
.btn-secondary{background:var(--raised);color:var(--chalk)}
.btn-danger{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 7px;font-size:11px;border-radius:5px}
.exercise-item{padding:10px 0;border-bottom:1px solid rgba(237,234,227,.05)}
.exercise-item:last-child{border-bottom:none}
.ex-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.ex-name{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--chalk);line-height:1.3;cursor:pointer}
.ex-prescription{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);white-space:nowrap;flex-shrink:0}
.ex-hint{font-size:11px;color:var(--blue);margin-bottom:6px;padding:4px 8px;background:rgba(58,124,165,.1);border-radius:5px;border-left:2px solid var(--blue)}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.set-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);width:22px;text-align:right;flex-shrink:0}
.set-input-group{display:flex;align-items:center;gap:4px;background:var(--raised);border-radius:7px;padding:5px 8px;flex:1}
.set-input-group label{font-size:10px;color:var(--dim)}
.set-input{background:none;border:none;color:var(--chalk);font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;width:42px;outline:none;text-align:center;-webkit-appearance:none}
.set-input::placeholder{color:rgba(156,147,136,.4)}
.set-sep{color:var(--dim);font-size:12px;padding:0 2px}
.set-done-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(237,234,227,.15);background:none;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;-webkit-tap-highlight-color:transparent}
.set-done-btn.done{background:var(--green);border-color:var(--green);color:#fff}

.superset-group{border:1.5px solid var(--blue);border-radius:10px;padding:8px;margin:6px 0;position:relative}
.superset-label{position:absolute;top:-9px;left:10px;background:var(--surface);padding:0 6px;font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--blue)}

.timer-display.urgent{color:var(--red)}

.timer-bar-fill{height:100%;background:var(--yellow);border-radius:2px;transition:width .3s linear}

.trigger-card{background:rgba(58,124,165,.08);border:1px solid rgba(58,124,165,.25);border-radius:10px;padding:12px;margin:0 14px 4px}
.trigger-header{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;color:var(--blue);margin-bottom:4px;text-transform:uppercase}
.chart-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.history-item{padding:10px 16px;border-bottom:1px solid rgba(237,234,227,.05);cursor:pointer}
.history-date{font-family:'Oswald',sans-serif;font-size:12px;color:var(--dim);letter-spacing:1px;margin-bottom:2px}
.history-title{font-size:14px;font-weight:600;color:var(--chalk)}
.program-phase{padding:10px 14px 4px}
.program-phase-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;color:var(--yellow);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(214,165,60,.2)}
.program-day{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border-radius:8px;margin-bottom:6px;border:1px solid rgba(237,234,227,.06)}
.program-day.current{border-color:var(--yellow);background:rgba(214,165,60,.07)}
.program-day.done-day{opacity:.5}
.program-day-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);width:28px;flex-shrink:0}
.program-day-type{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;flex:1}
.modal-overlay{position:fixed;inset:0;background:rgba(28,27,26,.85);z-index:300;display:flex;align-items:flex-end}
.modal-sheet{width:100%;background:var(--surface);border-radius:18px 18px 0 0;padding:20px 16px calc(20px + var(--safe-bottom));max-height:80vh;overflow-y:auto}
.modal-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:1.5px;margin-bottom:16px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(237,234,227,.06)}
.setting-label{font-size:14px;color:var(--chalk)}
.setting-sub{font-size:11px;color:var(--dim);margin-top:2px}
select.styled-select{background:var(--raised);border:1px solid rgba(237,234,227,.1);color:var(--chalk);font-family:'Inter',sans-serif;font-size:13px;padding:6px 10px;border-radius:7px;outline:none;-webkit-appearance:none;cursor:pointer}
.complete-section{padding:14px}
.btn-complete{width:100%;padding:16px;font-size:15px;letter-spacing:1px;border-radius:10px;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase}
.empty-state{text-align:center;padding:48px 24px;color:var(--dim)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
::-webkit-scrollbar{width:0;background:transparent}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.animate-up{animation:slideUp .2s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1s infinite}
</style>
</head>

function buildStd() {
  const days=[];
  const preP=['FOUNDATIONAL','TRIGGER','TRIGGER','FOUNDATIONAL','TRIGGER','TRIGGER','TRIGGER'];
  const p1P=['P1D1','TRIGGER','TRIGGER','P1D2','TRIGGER','TRIGGER','TRIGGER'];
  const p2P=['P2D1','TRIGGER','TRIGGER','P2D2','TRIGGER','TRIGGER','TRIGGER'];
  const p3P=['P3D1','TRIGGER','P3D2','TRIGGER','P3D3','TRIGGER','TRIGGER'];
  for(let w=0;w<3;w++) preP.forEach(t=>days.push({phase:'Pre',week:w+1,wk:t}));
  for(let w=0;w<3;w++) p1P.forEach(t=>days.push({phase:'Phase I',week:w+4,wk:t}));
  for(let w=0;w<3;w++) p2P.forEach(t=>days.push({phase:'Phase II',week:w+7,wk:t}));
  for(let w=0;w<3;w++) p3P.forEach(t=>days.push({phase:'Phase III',week:w+10,wk:t}));
  return days;
}
function buildAdv() {
  const days=[];
  const p3P=['P3D1','TRIGGER','P3D2','TRIGGER','P3D3','TRIGGER','TRIGGER'];
  [['P1D1','TRIGGER','P1D2','TRIGGER','P1D1','TRIGGER','TRIGGER'],
   ['P1D2','TRIGGER','P1D1','TRIGGER','P1D2','TRIGGER','TRIGGER'],
   ['P1D1','TRIGGER','P1D2','TRIGGER','P1D1','TRIGGER','TRIGGER']
  ].forEach((p,i)=>p.forEach(t=>days.push({phase:'Phase I',week:i+1,wk:t})));
  [['P2D1','TRIGGER','P2D2','TRIGGER','P2D1','TRIGGER','TRIGGER'],
   ['P2D2','TRIGGER','P2D1','TRIGGER','P2D2','TRIGGER','TRIGGER'],
   ['P2D1','TRIGGER','P2D2','TRIGGER','P2D1','TRIGGER','TRIGGER']
  ].forEach((p,i)=>p.forEach(t=>days.push({phase:'Phase II',week:i+4,wk:t})));
  for(let w=0;w<3;w++) p3P.forEach(t=>days.push({phase:'Phase III',week:w+7,wk:t}));
  return days;
}

function ls(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function fmt(s){return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0');}

const PLATE_COLORS={45:'#C2402E',35:'#D6A53C',25:'#3A7CA5',10:'#4C8B5B',5:'#9C9388',2.5:'#EDEAE3'};
function calcPlates(kg){
  if(!kg||kg<=0)return[];
  const lbs=kg*2.20462, bar=45;
  let rem=Math.max(0,(lbs-bar)/2);
  const out=[];
  for(const p of[45,35,25,10,5,2.5]){while(rem>=p-0.01){out.push(p);rem=Math.round((rem-p)*10)/10;}}
  return out;
}

function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    function beep(freq,t,dur){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;
      g.gain.setValueAtTime(0.35,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.start(t);o.stop(t+dur);
    }
    beep(880,ctx.currentTime,0.5);
    beep(1100,ctx.currentTime+0.3,0.4);
    beep(1320,ctx.currentTime+0.55,0.6);
  }catch(e){}
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────

function PlateViz({kg}){
  if(!kg||kg<=0)return null;
  const plates=calcPlates(kg);
  if(!plates.length)return h('span',{style:'font-size:10px;color:var(--dim);margin-left:4px'},'bar');
  return h('div',{class:'plate-viz'},
    plates.slice(0,5).map((p,i)=>{
      const ph=Math.max(16,Math.min(28,10+p*0.28));
      const pw=p>=35?13:p>=10?10:8;
      return h('div',{key:i,class:'plate',style:`width:${pw}px;height:${ph}px;background:${PLATE_COLORS[p]||'#9C9388'};opacity:.85`},
        p>=25?p:null);
    })
  );
}

function SetLogger({ex,exIdx,sessKey,onSetDone,lastData,atData}){
  const numSets=typeof ex.sets==='string'?parseInt(ex.sets.split('-')[1]):ex.sets;
  const initSets=()=>ls('sets_'+sessKey+'_'+exIdx,Array(numSets).fill(null).map(()=>({w:'',r:'',done:false})));
  const [sets,setSets]=useState(initSets);

  function upd(i,field,val){
    setSets(prev=>{
      const n=prev.map((s,idx)=>idx===i?{...s,[field]:val}:s);
      lsSet('sets_'+sessKey+'_'+exIdx,n);
      return n;
    });
  }
  function toggle(i){
    setSets(prev=>{
      const wasDone=prev[i].done;
      const n=prev.map((s,idx)=>idx===i?{...s,done:!s.done}:s);
      lsSet('sets_'+sessKey+'_'+exIdx,n);
      if(!wasDone) onSetDone && onSetDone();
      return n;
    });
  }
  function isPR(s){
    if(!s.w||!s.r||!s.done)return false;
    const vol=parseFloat(s.w)*parseFloat(s.r);
    return atData&&atData[ex.name]?vol>atData[ex.name]:false;
  }

  const ld=lastData&&lastData[ex.name];
  let hint=null;
  if(ld){
    hint=ld.r>=ex.hi
      ?'Last: '+ld.w+'kg × '+ld.r+' — try +2.5kg today ↑'
      :'Last: '+ld.w+'kg × '+ld.r;
  }

  return h(Fragment,null,
    hint&&h('div',{class:'ex-hint'},hint),
    sets.map((s,i)=>
      h('div',{class:'set-row',key:i},
        h('span',{class:'set-num'},i+1),
        h('div',{class:'set-input-group'},
          h('label',null,'kg'),
          h('input',{class:'set-input',type:'number',inputmode:'decimal',placeholder:'0',value:s.w,
            onInput:e=>upd(i,'w',e.target.value)}),
          h('span',{class:'set-sep'},'×'),
          h('label',{style:'width:22px'},'reps'),
          h('input',{class:'set-input',type:'number',inputmode:'numeric',placeholder:'0',value:s.r,
            onInput:e=>upd(i,'r',e.target.value)}),
        ),
        h(PlateViz,{kg:parseFloat(s.w)}),
        isPR(s)&&h('span',{class:'pr-badge'},'PR'),
        h('button',{class:'set-done-btn '+(s.done?'done':''),onClick:()=>toggle(i)},
          s.done
            ? h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':3},h('polyline',{points:'20 6 9 17 4 12'}))
            : h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':2},h('circle',{cx:12,cy:12,r:10}))
        )
      )
    )
  );
}

function ExCard({ex,exIdx,sessKey,onSetDone,lastData,atData}){
  const [open,setOpen]=useState(true);
  const setsStr=typeof ex.sets==='string'?ex.sets:ex.sets;
  const repStr=ex.unit==='sec'?ex.lo+'-'+ex.hi+'s':ex.lo+'-'+ex.hi;
  return h('div',{class:'exercise-item'},
    h('div',{class:'ex-header'},
      h('div',{class:'ex-name',onClick:()=>setOpen(o=>!o)},ex.name,' ',open?'▾':'▸'),
      h('span',{class:'ex-prescription'},setsStr,'×',repStr)
    ),
    open&&h(SetLogger,{ex,exIdx,sessKey,onSetDone,lastData,atData})
  );
}

function RestTimer({duration,onClose}){
  const [rem,setRem]=useState(duration);
  const [paused,setPaused]=useState(false);
  const total=useRef(duration);
  const iv=useRef(null);

  useEffect(()=>{
    if(paused||rem<=0){
      clearInterval(iv.current);
      if(rem<=0) playBeep();
      return;
    }
    iv.current=setInterval(()=>setRem(r=>{if(r<=1){clearInterval(iv.current);return 0;}return r-1;}),1000);
    return()=>clearInterval(iv.current);
  },[paused,rem===0]);

  const pct=total.current>0?((total.current-rem)/total.current)*100:0;
  return h('div',{class:'timer-overlay animate-up'},
    h('div',{class:'timer-top'},
      h('span',{class:'timer-label'},'REST TIMER'),
      h('button',{class:'btn btn-xs btn-secondary',onClick:onClose},'dismiss')
    ),
    h('div',{class:'timer-bar-track'},
      h('div',{class:'timer-bar-fill',style:'width:'+pct+'%'})
    ),
    h('div',{class:'timer-display '+(rem<=10&&rem>0?'urgent':'')+(rem===0?' pulse':'')},
      rem===0?'▶ GO':fmt(rem)
    ),
    h('div',{class:'timer-controls'},
      h('button',{class:'btn btn-secondary btn-sm',onClick:()=>setRem(r=>Math.max(0,r-15))},'-15s'),
      h('button',{class:'btn btn-primary btn-sm',onClick:()=>setPaused(p=>!p)},paused?'▶ Resume':'⏸ Pause'),
      h('button',{class:'btn btn-secondary btn-sm',onClick:()=>setRem(r=>r+15)},'+15s')
    )
  );
}

function TodayTab({cal,curDay,setCurDay,onSettings}){
  const [timerOn,setTimerOn]=useState(false);
  const [timerDur,setTimerDur]=useState(90);
  const completed=ls('completed',{});

  if(curDay<0||curDay>=cal.length)
    return h('div',{class:'empty-state'},h('div',{class:'empty-icon'},'🏁'),h('p',null,'Program complete! All '+cal.length+' days done.'));

  const day=cal[curDay];
  const restDur=PHASE_REST[day.phase]||90;
  const isTrigger=day.wk==='TRIGGER';
  let workout=null, trigIdx=0;
  if(isTrigger){
    trigIdx=cal.slice(0,curDay).filter(d=>d.wk==='TRIGGER').length%3;
    workout=TRIGGERS[trigIdx];
  } else if(WORKOUTS[day.wk]) workout=WORKOUTS[day.wk];

  const sessKey='day_'+curDay;
  function findLastKey(wk){for(let i=curDay-1;i>=0;i--){if(cal[i].wk===wk)return'day_'+i;}return null;}
  const lastKey=findLastKey(day.wk);
  const lastData=lastKey?ls('summary_'+lastKey,null):null;
  const atData=ls('at_'+day.wk,null);

  function onSetDone(){setTimerDur(restDur);setTimerOn(true);}

  function markDone(){
    if(!workout)return;
    const summary={};
    workout.exercises.forEach((ex,ei)=>{
      const numS=typeof ex.sets==='string'?parseInt(ex.sets.split('-')[1]):ex.sets;
      const sets=ls('sets_'+sessKey+'_'+ei,[]);
      const best=sets.filter(s=>s.done&&s.w&&s.r).reduce((b,s)=>{
        const v=parseFloat(s.w)*parseFloat(s.r);
        return !b||v>parseFloat(b.w)*parseFloat(b.r)?s:b;
      },null);
      if(best){
        summary[ex.name]={w:best.w,r:best.r};
        const at=ls('at_'+day.wk,{});
        const vol=parseFloat(best.w)*parseFloat(best.r);
        if(!at[ex.name]||vol>at[ex.name]){at[ex.name]=vol;lsSet('at_'+day.wk,at);}
      }
    });
    lsSet('summary_'+sessKey,summary);
    const hist=ls('hist',[]);
    hist.unshift({d:curDay+1,date:new Date().toLocaleDateString(),phase:day.phase,week:day.week,wname:workout.name,sk:sessKey});
    lsSet('hist',hist);
    const nc={...completed,[curDay]:true};lsSet('completed',nc);
    const next=curDay<cal.length-1?curDay+1:curDay;
    setCurDay(next);lsSet('curDay',next);
  }

  // Build exercise list with superset grouping
  function buildList(){
    if(!workout)return null;
    const exs=workout.exercises;
    const out=[];
    const seenSS={};
    exs.forEach((ex,i)=>{
      if(ex.ss){
        if(!seenSS[ex.ss]){
          seenSS[ex.ss]=true;
          const grp=exs.map((e,idx)=>e.ss===ex.ss?idx:-1).filter(x=>x>=0);
          out.push(h('div',{class:'superset-group',key:'ss'+ex.ss},
            h('span',{class:'superset-label'},'SUPERSET '+ex.ss),
            grp.map(gi=>h(ExCard,{key:gi,ex:exs[gi],exIdx:gi,sessKey,onSetDone,lastData,atData}))
          ));
        }
      } else {
        out.push(h(ExCard,{key:i,ex,exIdx:i,sessKey,onSetDone,lastData,atData}));
      }
    });
    return out;
  }

  const isDone=completed[curDay];
  return h(Fragment,null,
    h('div',{class:'day-hero animate-up'},
      h('h2',null,'Day '+(curDay+1)+' — '+WDAYS[curDay%7]),
      h('div',{class:'meta'},day.phase+' · Week '+day.week+(workout?' · '+workout.name:'')),
      h('div',{class:'meta',style:'color:var(--yellow)'},'Rest: '+fmt(restDur)+' between sets')
    ),
    h('div',{class:'day-controls'},
      h('div',{class:'day-jump'},
        h('label',null,'Jump to day'),
        h('input',{type:'number',inputmode:'numeric',min:1,max:cal.length,value:curDay+1,
          onInput:e=>{const v=parseInt(e.target.value)-1;if(v>=0&&v<cal.length){setCurDay(v);lsSet('curDay',v);}}}),
        h('span',{style:'font-size:11px;color:var(--dim)'},'/ '+cal.length)
      ),
      h('button',{class:'btn btn-secondary btn-sm',onClick:onSettings},'⚙')
    ),
    isTrigger&&h('div',{class:'trigger-card'},
      h('div',{class:'trigger-header'},'Trigger Session '+(trigIdx+1)+' of 3'),
      h('div',{style:'font-size:12px;color:var(--dim)'},'Light band/bodyweight — stay well within effort')
    ),
    h('div',{class:'card'},
      h('div',{class:'card-header'},
        h('span',{class:'card-title'},workout?workout.name.toUpperCase():'WORKOUT'),
        isDone&&h('span',{style:'color:var(--green);font-size:12px;font-weight:600'},'✓ Done')
      ),
      h('div',{class:'card-body'},buildList())
    ),
    h('div',{class:'complete-section'},
      h('button',{class:'btn '+(isDone?'btn-secondary':'btn-green')+' btn-complete',onClick:markDone},
        isDone?'✓ Completed — Next Day →':'Mark Day Complete →')
    ),
    timerOn&&h(RestTimer,{duration:timerDur,onClose:()=>setTimerOn(false)})
  );
}

function HistoryTab(){
  const hist=ls('hist',[]);
  const [sel,setSel]=useState(null);
  if(!hist.length)
    return h('div',{class:'empty-state'},h('div',{class:'empty-icon'},'📊'),h('p',null,'No sessions yet.\nComplete a workout to see history.'));

  function chartData(exName){
    return hist.slice().reverse().map(h2=>{
      const s=ls('summary_'+h2.sk,{});
      const e=s[exName];
      return e?{d:h2.d,vol:parseFloat(e.w)*parseFloat(e.r),w:e.w}:null;
    }).filter(Boolean);
  }

  function MiniChart({data,label}){
    if(!data||data.length<2)return null;
    const vals=data.map(d=>d.vol);
    const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
    const W=260,H=56,P=8;
    const pts=data.map((d,i)=>{
      const x=P+(i/(data.length-1))*(W-P*2);
      const y=H-P-((d.vol-mn)/rng)*(H-P*2);
      return[x,y];
    });
    const path=pts.map((p,i)=>(i===0?'M':'L')+p[0]+','+p[1]).join(' ');
    return h('div',{style:'margin-top:8px'},
      h('div',{style:'font-size:11px;color:var(--dim);margin-bottom:4px'},label,' — volume trend'),
      h('div',{class:'chart-wrap'},
        h('svg',{viewBox:'0 0 '+W+' '+H,width:W,height:H},
          h('path',{d:path,fill:'none',stroke:'var(--yellow)','stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'}),
          pts.map(([x,y],i)=>h('circle',{key:i,cx:x,cy:y,r:3,fill:'var(--yellow)',opacity:.8}))
        )
      )
    );
  }

  const selSess=sel!==null?hist[sel]:null;
  const selSum=selSess?ls('summary_'+selSess.sk,{}):{}; 
  return h('div',null,
    sel!==null&&h('div',{class:'card animate-up'},
      h('div',{class:'card-header'},
        h('span',{class:'card-title'},selSess.wname),
        h('button',{class:'btn btn-xs btn-secondary',onClick:()=>setSel(null)},'✕')
      ),
      h('div',{class:'card-body'},
        h('div',{style:'font-size:12px;color:var(--dim);margin-bottom:10px'},'Day '+selSess.d+' · '+selSess.date+' · '+selSess.phase),
        Object.entries(selSum).map(([name,data])=>h('div',{key:name,style:'margin-bottom:8px'},
          h('div',{style:'font-size:13px;font-weight:600'},name),
          h('div',{style:'font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--yellow)'},data.w+'kg × '+data.r+' reps'),
          h(MiniChart,{data:chartData(name),label:name})
        )),
        !Object.keys(selSum).length&&h('div',{style:'color:var(--dim);font-size:13px'},'No sets logged')
      )
    ),
    h('div',{class:'card'},
      h('div',{class:'card-header'},
        h('span',{class:'card-title'},'SESSION LOG'),
        h('span',{style:'font-size:12px;color:var(--dim)'},hist.length+' sessions')
      ),
      hist.map((h2,i)=>h('div',{class:'history-item',key:i,onClick:()=>setSel(sel===i?null:i)},
        h('div',{class:'history-date'},'Day '+h2.d+' · '+h2.date+' · '+h2.phase+' W'+h2.week),
        h('div',{class:'history-title'},h2.wname)
      ))
    )
  );
}

function ProgramTab({cal,curDay}){
  const completed=ls('completed',{});
  const phases={};
  cal.forEach((d,i)=>{if(!phases[d.phase])phases[d.phase]=[];phases[d.phase].push({...d,idx:i});});
  function label(wk){
    if(wk==='TRIGGER')return '⚡ Trigger';
    if(wk==='FOUNDATIONAL')return '💪 Foundational';
    return WORKOUTS[wk]?WORKOUTS[wk].name:wk;
  }
  return h('div',null,
    Object.entries(phases).map(([phase,days])=>
      h('div',{class:'program-phase',key:phase},
        h('div',{class:'program-phase-title'},phase),
        days.map(d=>h('div',{class:'program-day'+(d.idx===curDay?' current':'')+(completed[d.idx]?' done-day':''),key:d.idx},
          h('span',{class:'program-day-num'},'D'+(d.idx+1)),
          h('span',{class:'program-day-type',style:'color:'+(d.wk==='TRIGGER'?'var(--blue)':d.idx===curDay?'var(--yellow)':'var(--chalk)')},label(d.wk)),
          completed[d.idx]&&h('span',{style:'color:var(--green);font-size:12px'},'✓'),
          d.idx===curDay&&h('span',{style:'color:var(--yellow);font-size:10px;font-weight:700;letter-spacing:1px'},'TODAY')
        ))
      )
    )
  );
}

function SettingsSheet({variant,setVariant,onClose}){
  return h('div',{class:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h('div',{class:'modal-sheet animate-up'},
      h('div',{class:'modal-title'},'⚙ Settings'),
      h('div',{class:'setting-row'},
        h('div',null,
          h('div',{class:'setting-label'},'Program Variant'),
          h('div',{class:'setting-sub'},'Standard 12-week or Advanced 9-week')
        ),
        h('select',{class:'styled-select',value:variant,onChange:e=>{setVariant(e.target.value);lsSet('variant',e.target.value);}},
          h('option',{value:'standard'},'Standard'),
          h('option',{value:'advanced'},'Advanced')
        )
      ),
      h('div',{class:'setting-row'},
        h('div',null,
          h('div',{class:'setting-label'},'Reset All Data'),
          h('div',{class:'setting-sub'},'Clear progress and start over')
        ),
        h('button',{class:'btn btn-danger btn-sm',onClick:()=>{
          if(confirm('Reset ALL progress? This cannot be undone.')){localStorage.clear();location.reload();}
        }},'Reset')
      ),
      h('div',{style:'margin-top:20px'},
        h('button',{class:'btn btn-secondary',style:'width:100%',onClick:onClose},'Close')
      )
    )
  );
}

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('today');
  const [variant,setVariant]=useState(()=>ls('variant','standard'));
  const [curDay,setCurDay]=useState(()=>ls('curDay',0));
  const [settings,setSettings]=useState(false);

  const cal=variant==='advanced'?buildAdv():buildStd();
  const day=curDay<cal.length?cal[curDay]:null;
  const phase=day?day.phase:'';
  const phaseColors={'Pre':'#9C9388','Phase I':'#3A7CA5','Phase II':'#D6A53C','Phase III':'#C2402E'};
  const pc=phaseColors[phase]||'#D6A53C';

  const TABS=[
    {id:'today',label:'TODAY',icon:h('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':1.8},h('rect',{x:3,y:4,width:18,height:18,rx:2}),h('line',{x1:3,y1:9,x2:21,y2:9}),h('line',{x1:8,y1:2,x2:8,y2:6}),h('line',{x1:16,y1:2,x2:16,y2:6}))},
    {id:'program',label:'PROGRAM',icon:h('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':1.8},h('path',{d:'M3 12h18M3 6h18M3 18h18'}))},
    {id:'history',label:'HISTORY',icon:h('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':1.8},h('polyline',{points:'22 12 18 12 15 21 9 3 6 12 2 12'}))},
  ];

  return h('div',{class:'app-shell'},
    h('div',{class:'top-bar'},
      h('h1',null,'MAPS ANABOLIC'),
      phase&&h('span',{class:'phase-badge',style:'color:'+pc+';border-color:'+pc+'33;background:'+pc+'18'},phase.toUpperCase())
    ),
    h('div',{class:'scroll-content'},
      tab==='today'&&h(TodayTab,{cal,curDay,setCurDay,onSettings:()=>setSettings(true)}),
      tab==='program'&&h(ProgramTab,{cal,curDay}),
      tab==='history'&&h(HistoryTab,null)
    ),
    h('div',{class:'tab-bar'},
      TABS.map(t=>h('button',{class:'tab-btn'+(tab===t.id?' active':''),key:t.id,onClick:()=>setTab(t.id)},t.icon,t.label))
    ),
    settings&&h(SettingsSheet,{variant,setVariant,onClose:()=>setSettings(false)})
  );
}

render(h(App,null),document.getElementById('app'));
</script>
